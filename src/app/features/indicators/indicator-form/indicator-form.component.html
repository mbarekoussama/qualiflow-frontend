<div class="page-container">
    <!-- PAGE HEADER -->
    <div class="page-header-bar">
        <div class="ph-title-group">
            <button class="btn-sub-back" (click)="goBack()" title="Annuler">
                <mat-icon>close</mat-icon>
            </button>
            <div>
                <h1>{{ isEdit ? 'Modifier' : 'Nouvel' }} Indicateur</h1>
                <div class="sub">Configuration des paramètres et objectifs de performance</div>
            </div>
        </div>
    </div>

    <div class="content-scroll">
        <div class="loading-overlay" *ngIf="loading">
            <mat-spinner diameter="40"></mat-spinner>
        </div>

        <form *ngIf="!loading" [formGroup]="form" (ngSubmit)="submit()" class="flat-form">
            <div class="form-section">
                <div class="form-section-title">Informations Générales</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Processus Responsable <span class="req">*</span></label>
                        <select formControlName="processId">
                            <option [value]="null">— Sélectionner —</option>
                            <option *ngFor="let p of processes" [value]="p.id">{{p.code}} - {{p.name}}</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Code / Référence <span class="req">*</span></label>
                        <input type="text" formControlName="code" placeholder="Ex: KPI-QUAL-01">
                    </div>
                    <div class="form-group full">
                        <label>Désignation de l'indicateur <span class="req">*</span></label>
                        <input type="text" formControlName="name" placeholder="Ex: Taux de satisfaction client">
                    </div>
                    <div class="form-group full">
                        <label>Description & Objectif</label>
                        <textarea formControlName="description" rows="3"
                            placeholder="A quoi sert cet indicateur ?"></textarea>
                    </div>
                    <div class="form-group full">
                        <label>Méthode de Calcul</label>
                        <textarea formControlName="calculationMethod" rows="2"
                            placeholder="Ex: (Points obtenus / Points max) * 100"></textarea>
                    </div>
                </div>
            </div>

            <div class="form-section">
                <div class="form-section-title">Pilotage & Objectifs</div>
                <div class="form-grid">
                    <div class="form-group">
                        <label>Unité de mesure</label>
                        <input type="text" formControlName="unit" placeholder="%, kg, etc.">
                    </div>
                    <div class="form-group">
                        <label>Valeur Cible <span class="req">*</span></label>
                        <input type="number" formControlName="targetValue">
                    </div>
                    <div class="form-group">
                        <label>Seuil d'Alerte <span class="req">*</span></label>
                        <input type="number" formControlName="alertThreshold">
                    </div>
                    <div class="form-group">
                        <label>Fréquence de mesure <span class="req">*</span></label>
                        <select formControlName="measurementFrequency">
                            <option *ngFor="let o of frequencyOptions" [value]="o.value">{{o.label}}</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Responsable du suivi <span class="req">*</span></label>
                        <select formControlName="responsibleUserId">
                            <option [value]="null">— Sélectionner —</option>
                            <option *ngFor="let u of users" [value]="u.id">{{u.firstName}} {{u.lastName}}</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Statut initial</label>
                        <select formControlName="status">
                            <option value="ACTIF">Opérationnel</option>
                            <option value="INACTIF">Désactivé / Brouillon</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="sticky-footer">
                <button type="button" class="btn btn-ghost" (click)="goBack()" [disabled]="saving">Annuler</button>
                <button type="submit" class="btn btn-primary" [disabled]="saving || form.invalid">
                    <mat-spinner radius="10" *ngIf="saving" diameter="18"></mat-spinner>
                    {{ isEdit ? 'Enregistrer les modifications' : 'Créer l\'indicateur' }}
                </button>
            </div>
        </form>
    </div>
</div>
