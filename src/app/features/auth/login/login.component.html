<div class="login-wrapper">
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="logo">
          <img src="assets/logo.png" alt="Logo QualiFlow" />
        </div>
        <h1>Bienvenue</h1>
        <p>Connectez-vous a votre espace de gestion</p>
      </div>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
        <div class="form-group">
          <label for="email">Adresse email</label>
          <div class="input-wrapper">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M16 12a4 4 0 10-8 0 4 4 0 008 0zm0 0v1.5a2.5 2.5 0 005 0V12a9 9 0 10-9 9m4.5-1.206a8.959 8.959 0 01-4.5 1.207"/>
            </svg>
            <input
              id="email"
              type="email"
              formControlName="email"
              placeholder="votre@email.com"
              [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          </div>
          <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error-message">
            <span *ngIf="loginForm.get('email')?.hasError('required')">L'email est requis</span>
            <span *ngIf="loginForm.get('email')?.hasError('email')">Format d'email invalide</span>
          </div>
        </div>

        <div class="form-group">
          <label for="password">Mot de passe</label>
          <div class="input-wrapper">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <circle cx="12" cy="16" r="1"></circle>
              <path d="M7 11V7a5 5 0 0110 0v4"></path>
            </svg>
            <input
              id="password"
              [type]="hidePassword ? 'password' : 'text'"
              formControlName="password"
              placeholder="Votre mot de passe"
              [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
            <button
              title="Oublié le mot de passe?"
              type="button"
              class="toggle-password"
              (click)="hidePassword = !hidePassword">
              <svg *ngIf="hidePassword" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg *ngIf="!hidePassword" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"></path>
                <line x1="1" y1="1" x2="23" y2="23"></line>
              </svg>
            </button>
          </div>
          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="error-message">
            Le mot de passe est requis
          </div>
        </div>

        <button
          type="submit"
          class="login-btn"
          [disabled]="loginForm.invalid || isLoading"
          [class.loading]="isLoading">
          <span *ngIf="!isLoading">Se connecter</span>
          <span *ngIf="isLoading" class="loading-content">
            <svg class="spinner" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-dasharray="31.416" stroke-dashoffset="31.416">
                <animate attributeName="stroke-dasharray" dur="2s" values="0 31.416;15.708 15.708;0 31.416" repeatCount="indefinite"/>
                <animate attributeName="stroke-dashoffset" dur="2s" values="0;-15.708;-31.416" repeatCount="indefinite"/>
              </circle>
            </svg>
            Connexion...
          </span>
        </button>

        <div class="auth-links">
          <a routerLink="/forgot-password">Mot de passe oublie ?</a>
          <a routerLink="/register">Creer un compte</a>
        </div>
      </form>

      <div class="demo-credentials">
        <div class="demo-header">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10"></circle>
            <path d="M12 6v6l4 2"></path>
          </svg>
          <span>Comptes de demonstration</span>
        </div>

        <div class="credentials">
          <div class="credential-item" *ngFor="let account of demoAccounts">
            <div class="credential-main">
              <strong>{{ account.label }}</strong>
              <small>{{ account.role }}</small>
            </div>
            <div class="credential-values">
              <span>{{ account.email }}</span>
              <span>{{ account.password }}</span>
            </div>
            <button
              type="button"
              class="use-account-btn"
              (click)="useDemoAccount(account)">
              Utiliser
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="login-background">
    <div class="bg-pattern"></div>
  </div>
</div>
