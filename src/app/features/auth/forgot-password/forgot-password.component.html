<div class="auth-wrapper">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>Mot de passe oublie</h1>
        <p>Entrez votre email pour lancer la reinitialisation</p>
      </div>

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="auth-form" *ngIf="!isSubmitted">
        <div class="form-group">
          <label for="email">Email</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="votre@email.com"
            [class.error]="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched" />
          <small class="error-message" *ngIf="forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched">
            Email invalide
          </small>
        </div>

        <div class="error-box" *ngIf="errorMessage">
          {{ errorMessage }}
        </div>

        <button type="submit" class="submit-btn" [disabled]="isLoading || forgotForm.invalid">
          {{ isLoading ? 'Envoi...' : 'Envoyer la demande' }}
        </button>
      </form>

      <div class="success-box" *ngIf="isSubmitted">
        Si un compte existe avec cet email, une instruction de reinitialisation a ete envoyee.
      </div>

      <div class="links">
        <a routerLink="/login">Retour connexion</a>
        <a routerLink="/register">Creer un compte</a>
      </div>
    </div>
  </div>

  <div class="auth-background"></div>
</div>
