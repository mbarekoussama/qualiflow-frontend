<button mat-icon-button [matMenuTriggerFor]="notificationMenu" matBadgeColor="warn" [matBadgeHidden]="unreadCount === 0"
  [matBadge]="unreadCount > 99 ? '99+' : unreadCount" matBadgeSize="small" class="notif-button"
  aria-label="Notifications">
  <mat-icon>notifications</mat-icon>
</button>

<mat-menu #notificationMenu="matMenu" class="notification-menu shadow-lg" (menuOpened)="onMenuOpened()">
  <!-- HEADER -->
  <div class="menu-header" (click)="$event.stopPropagation()">
    <div>
      <h4>Notifications</h4>
      <span>{{ unreadCount }} message(s) non lu(s)</span>
    </div>
    <button mat-button type="button" class="btn-mark-all" (click)="markAllAsRead($event)">
      Tout lire
    </button>
  </div>

  <!-- CONTENT -->
  <div class="menu-content" (click)="$event.stopPropagation()">
    <!-- LOADING -->
    <div *ngIf="loading" class="menu-loading">
      <mat-spinner diameter="32"></mat-spinner>
      <p>Chargement...</p>
    </div>

    <!-- EMPTY -->
    <div *ngIf="!loading && recentNotifications.length === 0" class="menu-empty">
      <mat-icon>notifications_none</mat-icon>
      <p>Aucune notification récente</p>
    </div>

    <!-- ITEMS -->
    <div *ngFor="let item of recentNotifications; trackBy: trackById" class="menu-item" [class.unread]="!item.isRead"
      (click)="openNotification(item)">

      <div class="menu-item-icon shadow-xs">
        <mat-icon>{{ getIcon(item) }}</mat-icon>
      </div>

      <div class="menu-item-content">
        <strong>{{ item.title }}</strong>
        <p>{{ item.message }}</p>
        <span>{{ item.createdAt | date: 'dd MMM, HH:mm' }}</span>
      </div>

      <button *ngIf="!item.isRead" mat-icon-button type="button" class="btn-read-item" matTooltip="Marquer comme lue"
        (click)="markAsRead(item, $event)">
        <mat-icon>done</mat-icon>
      </button>
    </div>
  </div>

  <!-- FOOTER -->
  <div class="menu-footer" (click)="$event.stopPropagation()">
    <button mat-stroked-button type="button" class="btn-all" (click)="openCenter()">
      Voir tout le centre de notifications
    </button>
  </div>
</mat-menu>
