<div class="topbar-user">
  <div class="user-info">
    <div class="topbar-user-name">{{ getDisplayName() }}</div>
    <div class="topbar-user-role">{{ currentUser?.role || 'Utilisateur' }}</div>
  </div>

  <button class="topbar-logout-btn" type="button" (click)="logout()">
    Deconnecter
  </button>

  <div class="topbar-user-av">
    <img *ngIf="profilePhotoObjectUrl; else initialsTpl" [src]="profilePhotoObjectUrl" alt="Photo profil" />
    <ng-template #initialsTpl>{{ getInitials() }}</ng-template>
  </div>
</div>
